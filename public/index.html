<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora LME — Estanho</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surf2: #1c2230;
    --border: #2a3445;
    --accent: #e82020;
    --acc2: #db5b5b;
    --text: #e6edf3;
    --muted: #7d8590;
    --green: #3fb950;
    --red: #f85149;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 56px;
  }

  header {
    max-width: 980px;
    margin: 0 auto 28px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  h1 { font-size: 26px; }
  h1 em { color: var(--accent); font-style: normal; }

  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 13px;
    border-radius: 20px;
    background: var(--surf2);
    border: 1px solid var(--border);
  }

  .tickers {
    max-width: 980px;
    margin: 0 auto 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }

  .tcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }

  .tcard-label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .tcard-val {
    font-size: 22px;
    font-family: var(--mono);
    font-weight: 600;
  }

  .tcard-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .grid {
    max-width: 980px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  @media (max-width: 680px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .ptitle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  input {
    width: 100%;
    padding: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-family: var(--mono);
  }

  .btn-calc {
    background: var(--accent);
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  td, th {
    padding: 10px;
    border-bottom: 1px solid var(--border);
  }

  .val-final {
    color: var(--green);
    font-weight: 600;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 30px;
  }
</style>
</head>

<body>

<header>
  <h1>Calculadora <em>Estanho</em></h1>
  <div class="pill" id="pill">Carregando...</div>
</header>

<!-- TICKERS -->
<div class="tickers">

  <div class="tcard">
    <div class="tcard-label">Estanho (dia)</div>
    <div class="tcard-val" id="tSn">—</div>
  </div>

  <div class="tcard">
    <div class="tcard-label">Dólar (dia)</div>
    <div class="tcard-val" id="tUsd">—</div>
  </div>

  <div class="tcard">
    <div class="tcard-label">Média Semana</div>
    <div class="tcard-val" id="tWeek">—</div>
  </div>

  <div class="tcard">
    <div class="tcard-label">Média Mês</div>
    <div class="tcard-val" id="tMonth">—</div>
  </div>

  <div class="tcard">
    <div class="tcard-label">Base</div>
    <div class="tcard-val" id="tBase">—</div>
  </div>

</div>

<!-- GRID -->
<div class="grid">

  <div class="panel">
    <div class="ptitle">Cotações</div>

    <input id="inSn" placeholder="Estanho">
    <br><br>
    <input id="inUsd" placeholder="Dólar">
    <br><br>
    <input id="inDate" readonly>
  </div>

  <div class="panel">
    <div class="ptitle">Ações</div>
    <button class="btn-calc" onclick="calcular()">Calcular</button>
  </div>

  <div class="panel" style="grid-column:1/-1">
    <div class="ptitle">Resultado</div>
    <div id="results" class="empty">Clique em calcular</div>
  </div>

</div>

<script>
const FATORES = { 0:0.9075, 4:0.8712, 7:0.8439, 12:0.7986, 18:0.7442 };

function fmt(n){ return Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2}); }

async function loadCotacoes(){
  const res = await fetch('/api/cotacoes');
  const data = await res.json();

  document.getElementById('inSn').value = data.hoje.estanho;
  document.getElementById('inUsd').value = data.hoje.dolar;
  document.getElementById('inDate').value = data.hoje.data;

  document.getElementById('tSn').innerText = fmt(data.hoje.estanho);
  document.getElementById('tUsd').innerText = fmt(data.hoje.dolar);

  const week = (data.semana.estanho * data.semana.dolar) / 1000;
  const month = (data.mes.estanho * data.mes.dolar) / 1000;

  document.getElementById('tWeek').innerText = 'R$ ' + fmt(week);
  document.getElementById('tMonth').innerText = 'R$ ' + fmt(month);

  const base = (data.hoje.estanho * data.hoje.dolar * FATORES[0]) / 1000;
  document.getElementById('tBase').innerText = 'R$ ' + fmt(base);

  document.getElementById('pill').innerText = 'Atualizado';
}

function calcular(){
  const sn = parseFloat(inSn.value);
  const usd = parseFloat(inUsd.value);

  const base = (sn * usd * FATORES[0]) / 1000;

  document.getElementById('results').innerHTML = `
    <table>
      <tr><th>Base</th><td class="val-final">R$ ${fmt(base)}</td></tr>
    </table>
  `;
}

loadCotacoes();
</script>

</body>
</html>
